server:
  # Behind nginx: honour X-Forwarded-Proto/Host so scheme/host/port reflect the public request.
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:sharepay}
    username: ${DB_USER:sharepay}
    password: ${DB_PASSWORD:sharepay}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
