spring:
  application:
    name: sharepay-backend
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    # HS256 requires >= 32 bytes. Override in production via JWT_SECRET.
    secret: ${JWT_SECRET:change-me-dev-secret-please-override-in-prod-0123456789abcdef}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  # Demo data seeding is OFF by default (so production never creates the demo account).
  # The dev profile turns it on; set DEMO_SEED_ENABLED=true to enable elsewhere.
  demo-seed-enabled: ${DEMO_SEED_ENABLED:false}

logging:
  level:
    com.sharepay: INFO
