services:
  postgres:
    image: postgres:16-alpine
    container_name: sharepay-postgres
    environment:
      POSTGRES_DB: sharepay
      POSTGRES_USER: sharepay
      POSTGRES_PASSWORD: sharepay
    ports:
      - "5432:5432"
    volumes:
      - sharepay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharepay -d sharepay"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharepay-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sharepay
      DB_USER: sharepay
      DB_PASSWORD: sharepay
      JWT_SECRET: change-me-in-production-please-0123456789abcdef-zyxwvu
      JWT_EXPIRATION_MINUTES: 1440
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sharepay-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  sharepay-pgdata:
